<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doctor Profile - QwikDoc</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { primary: { 50: '#f0f9ff', 100: '#e0f2fe', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1' }, dark: '#0f172a' }, fontFamily: { sans: ['Inter', 'sans-serif'] } } } }
  </script>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/png" href="logo/icon.png">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 text-dark flex flex-col min-h-screen">

  <header id="main-header" class="fixed w-full top-0 z-50 bg-white border-b border-slate-100">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-20">
        <div class="flex-shrink-0 flex items-center">
          <a href="index.html" class="flex items-center group">
            <img src="logo/primary.png" alt="QwikDoc Logo" class="h-14 w-auto object-contain">
          </a>
        </div>
        <div class="hidden md:flex items-center space-x-4" id="auth-menu-container"></div>
        <div class="md:hidden flex items-center"><button id="mobile-menu-btn"><svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" /></svg></button></div>
      </div>
    </div>
    <div id="mobile-menu" class="hidden bg-white border-t border-slate-100 absolute w-full shadow-md"><div id="mobile-auth-container" class="pb-4"></div></div>
  </header>

  <main class="flex-grow pt-28 pb-16">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      
      <div id="profile-container" class="fade-in">
        <div class="text-center py-20"><div class="spinner mx-auto"></div></div>
      </div>

    </div>
  </main>

  <script src="js/supabase.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const urlParams = new URLSearchParams(window.location.search);
      const doctorId = urlParams.get('id');
      
      if (!doctorId) {
        document.getElementById('profile-container').innerHTML = '<div class="text-center py-20 text-red-500 font-bold">Doctor not found. Invalid URL.</div>';
        return;
      }

      try {
        const [doc, venues] = await Promise.all([
          DataService.getDoctorById(doctorId),
          DataService.getDoctorClinics(doctorId)
        ]);
        
        if (!doc) {
          document.getElementById('profile-container').innerHTML = '<div class="text-center py-20 text-red-500 font-bold">Doctor not found locally.</div>';
          return;
        }

        // Render Profile
        const html = `
          <div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden mb-8">
            <div class="h-32 bg-gradient-to-r from-primary-400 to-primary-600"></div>
            
            <div class="px-6 sm:px-10 pb-10 flex flex-col md:flex-row gap-8 relative">
              <img src="${doc.image || 'https://via.placeholder.com/400'}" alt="${doc.name}" class="w-40 h-40 rounded-2xl object-cover border-4 border-white shadow-xl -mt-16 bg-white shrink-0">
              
              <div class="pt-4 md:pt-6 flex-grow flex flex-col md:flex-row justify-between gap-6">
                <div class="px-2">
                  <h1 class="text-2xl sm:text-3xl font-extrabold text-dark mb-2">${doc.name}${doc.degree ? `<span class="text-lg sm:text-xl font-bold text-slate-600 block sm:inline mt-1 sm:mt-0">(${doc.degree})</span>` : ''}</h1>
                  <p class="text-base sm:text-lg text-primary-600 font-bold mb-4">${doc.specialization}</p>
                  <div class="flex flex-wrap gap-3 text-xs sm:text-sm font-bold text-slate-500">
                    <span class="flex items-center gap-1 bg-yellow-50 text-yellow-700 px-2 py-1 rounded-lg"><span class="text-yellow-500">★</span> ${parseFloat(doc.rating).toFixed(1)} (${doc.reviews} Reviews)</span>
                    <span class="flex items-center gap-1 bg-slate-100 text-slate-600 px-2 py-1 rounded-lg">${doc.experience} Experience</span>
                  </div>
                </div>
                
                <div class="flex flex-col gap-3 shrink-0">
                  ${venues.length > 0 ? `
                  <a href="booking.html?id=${doc.id}" class="bg-primary-600 hover:bg-primary-700 text-white font-bold py-3 px-8 rounded-xl shadow-md shadow-primary-500/30 transition-transform hover:-translate-y-0.5 text-center block">Book Appointment</a>
                  ` : `
                  <div class="bg-slate-100 text-slate-500 font-bold py-3 px-8 rounded-xl shadow-inner text-center block cursor-not-allowed">Currently Unavailable</div>
                  `}
                  <p class="text-center text-sm font-semibold text-slate-500">Fee: ₹${doc.consultation_fee}</p>
                </div>
              </div>
            </div>
          </div>

          <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 space-y-8">
              <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-8 hover-float">
                <h2 class="text-xl font-bold text-dark mb-4">About the Doctor</h2>
                <p class="text-slate-600 leading-relaxed font-medium">${doc.about || 'A dedicated medical professional.'}</p>
              </div>

              ${doc.languages_fluent ? `
              <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-8 hover-float">
                <h2 class="text-xl font-bold text-dark mb-4">Languages</h2>
                <p class="text-slate-600 leading-relaxed font-medium">${doc.languages_fluent}</p>
              </div>
              ` : ''}

              ${venues.length > 0 ? `
              <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-8 hover-float">
                <h2 class="text-xl font-bold text-dark mb-6">Practice Locations</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                  ${venues.map(v => `
                    <div class="bg-slate-50 p-5 rounded-2xl border border-slate-100">
                      <h4 class="font-bold text-dark mb-1 flex items-center gap-2">🏥 ${v.clinic?.name || 'Unknown Clinic'}</h4>
                      <p class="text-sm text-slate-600 mb-3">${v.clinic?.address || ''} (PIN: ${v.clinic?.pin || ''})</p>
                      <div class="bg-white px-3 py-1.5 rounded-lg text-xs font-bold text-primary-600 inline-block border border-primary-100">
                        🕒 ${v.schedule}
                      </div>
                    </div>
                  `).join('')}
                </div>
              </div>
              ` : ''}
            </div>
            
            <div class="space-y-8">
              <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-8 hover-float">
                <h2 class="text-xl font-bold text-dark mb-4">Contact & Logistics</h2>
                
                <div class="flex items-start gap-4 mb-6">
                  <div class="w-10 h-10 bg-primary-50 rounded-xl flex items-center justify-center text-primary-600 shrink-0">📍</div>
                  <div>
                    <h4 class="font-bold text-dark text-sm">Main Office</h4>
                    <p class="text-slate-600 text-sm font-medium mt-1">${doc.location || ''}<br>${doc.city}${doc.pin ? `, ${doc.pin}` : ''}</p>
                  </div>
                </div>

                ${doc.phone ? `
                <div class="flex items-start gap-4 mb-6">
                  <div class="w-10 h-10 bg-primary-50 rounded-xl flex items-center justify-center text-primary-600 shrink-0">📞</div>
                  <div>
                    <h4 class="font-bold text-dark text-sm">Professional Phone</h4>
                    <p class="text-slate-600 text-sm font-medium mt-1">${doc.phone}</p>
                  </div>
                </div>
                ` : ''}

                <div class="flex items-start gap-4 mb-6">
                  <div class="w-10 h-10 bg-primary-50 rounded-xl flex items-center justify-center text-primary-600 shrink-0">💵</div>
                  <div>
                    <h4 class="font-bold text-dark text-sm">Consultation Fee</h4>
                    <p class="text-slate-600 text-sm font-medium mt-1">₹${doc.consultation_fee}</p>
                  </div>
                </div>

                <div class="flex items-start gap-4">
                  <div class="w-10 h-10 bg-primary-50 rounded-xl flex items-center justify-center text-primary-600 shrink-0">📅</div>
                  <div>
                    <h4 class="font-bold text-dark text-sm">Regular Availability</h4>
                    <ul class="text-slate-600 text-sm font-medium mt-1 space-y-1">
                      ${(doc.availability || []).map(a => `<li>${a}</li>`).join('')}
                    </ul>
                  </div>
                </div>
              </div>
            </div>
          </div>
        `;
        
        document.getElementById('profile-container').innerHTML = html;
      } catch(e) {
        document.getElementById('profile-container').innerHTML = '<div class="text-center py-20 text-red-500 font-bold">Error loading doctor profile. Ensure Supabase is connected.</div>';
      }
    });
  </script>
</body>
</html>
