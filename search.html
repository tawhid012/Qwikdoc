<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search Doctors - QuickDoc</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { primary: { 50: '#f0f9ff', 100: '#e0f2fe', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1' }, dark: '#0f172a' }, fontFamily: { sans: ['Inter', 'sans-serif'] } } } }
  </script>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/png" href="logo/icon.png">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 text-dark flex flex-col min-h-screen">

  <header id="main-header" class="fixed w-full top-0 z-50 bg-white border-b border-slate-100">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-20">
        <div class="flex-shrink-0 flex items-center">
          <a href="index.html" class="flex items-center group">
            <img src="logo/primary.png" alt="QuickDoc Logo" class="h-14 w-auto hidden md:block object-contain">
            <img src="logo/icon.png" alt="QuickDoc Icon" class="h-12 w-auto md:hidden object-contain">
          </a>
        </div>
        <div class="hidden md:flex items-center space-x-8">
          <a href="#" class="font-medium text-primary-600">Find Doctors</a>
        </div>
        <div class="hidden md:flex items-center space-x-4" id="auth-menu-container"></div>
        <div class="md:hidden flex items-center"><button id="mobile-menu-btn"><svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" /></svg></button></div>
      </div>
    </div>
    <div id="mobile-menu" class="hidden bg-white border-t border-slate-100 absolute w-full shadow-md"><div id="mobile-auth-container" class="pb-4"></div></div>
  </header>

  <main class="flex-grow pt-28 pb-16">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      
      <div class="flex flex-col lg:flex-row gap-8">
        
        <!-- Sidebar Filters -->
        <div class="w-full lg:w-1/4 flex-shrink-0 mb-8 lg:mb-0">
          <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 sticky top-28 fade-in">
            <h3 class="font-bold text-dark text-lg mb-6 flex items-center gap-2">
              <svg class="w-5 h-5 text-primary-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"></path></svg>
              Filter Search
            </h3>
            
            <form id="filter-form" class="space-y-6">
              <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Search Name/Keywords</label>
                <div class="relative">
                  <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">🔍</span>
                  <input type="text" id="f-keyword" autocomplete="off" class="w-full pl-10 pr-3 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-primary-500 text-sm bg-slate-50 focus:bg-white transition-colors" placeholder="e.g. Cardiologist">
                  <!-- Autocomplete Dropdown Menu -->
                  <div id="autocomplete-dropdown" class="absolute z-[100] w-full bg-white mt-1 rounded-xl shadow-2xl border border-slate-100 max-h-60 overflow-y-auto hidden text-left flex-col divide-y divide-slate-50"></div>
                </div>
              </div>
              
              <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Location</label>
                <div class="relative">
                  <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">📍</span>
                  <input type="text" id="f-location" class="w-full pl-10 pr-3 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-primary-500 text-sm bg-slate-50 focus:bg-white transition-colors" placeholder="City or Zip">
                </div>
              </div>
              
              <button type="submit" class="w-full bg-dark hover:bg-slate-800 text-white font-bold py-3 rounded-xl transition-colors shadow-md text-sm">Apply Filters</button>
            </form>
          </div>
        </div>

        <!-- Search Results -->
        <div class="w-full lg:w-3/4 fade-in" style="animation-delay: 0.1s;">
          <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold text-dark">Doctors Available</h2>
            <span class="text-sm font-medium text-slate-500 bg-slate-100 px-3 py-1 rounded-full"><span id="result-count">0</span> matching results</span>
          </div>
          
          <div id="results-container" class="space-y-4">
            <div class="text-center py-20"><div class="spinner mx-auto"></div></div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="js/supabase.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const urlParams = new URLSearchParams(window.location.search);
      const q = urlParams.get('q') || '';
      const loc = urlParams.get('loc') || '';

      document.getElementById('f-keyword').value = q;
      document.getElementById('f-location').value = loc;

      let allDoctors = [];
      try {
        allDoctors = await DataService.getDoctors();
      } catch(e) {
        document.getElementById('results-container').innerHTML = '<div class="text-center text-red-500 py-10">Error loading Supabase or doctors data.</div>';
        return;
      }

      function renderDoctors(doctors) {
        const container = document.getElementById('results-container');
        document.getElementById('result-count').textContent = doctors.length;
        
        if (doctors.length === 0) {
          container.innerHTML = `
            <div class="bg-white rounded-2xl border border-slate-100 p-12 text-center shadow-sm">
              <div class="w-16 h-16 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl">🔍</div>
              <h3 class="text-lg font-bold text-dark mb-2">No doctors found</h3>
              <p class="text-slate-500">Try adjusting your search criteria or location.</p>
            </div>`;
          return;
        }

        const html = doctors.map(doc => `
          <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 flex flex-col md:flex-row gap-6 hover:shadow-md transition-shadow">
            <img src="${doc.image || 'https://via.placeholder.com/400'}" alt="${doc.name}" class="w-32 h-32 md:w-40 md:h-40 rounded-xl object-cover shrink-0">
            
            <div class="flex-grow flex flex-col justify-between">
              <div>
                <div class="flex justify-between items-start mb-2">
                  <h3 class="font-bold text-2xl text-dark">${doc.name}</h3>
                  <div class="bg-green-50 text-green-700 px-2.5 py-1 rounded-lg text-xs font-bold flex items-center gap-1 border border-green-100 shrink-0">
                    <span class="text-yellow-500">★</span> ${parseFloat(doc.rating).toFixed(1)} (${doc.reviews})
                  </div>
                </div>
                <p class="text-primary-600 font-semibold mb-4 text-sm">${doc.specialization} &nbsp;•&nbsp; <span class="text-slate-500">${doc.experience} Experience</span></p>
                
                <div class="flex flex-col gap-2 text-sm text-slate-600 mb-6 font-medium">
                  <div class="flex items-center gap-2"><span class="text-slate-400">📍</span> ${doc.location || ''}, ${doc.city}</div>
                  <div class="flex items-center gap-2"><span class="text-slate-400">💵</span> ₹${doc.consultation_fee} Consultation Fee</div>
                </div>
              </div>
              
              <div class="flex gap-3 mt-auto">
                <a href="doctor.html?id=${doc.id}" class="flex-1 bg-white border-2 border-primary-500 text-primary-600 hover:bg-primary-50 font-bold py-2.5 rounded-xl text-center transition-colors">View Profile</a>
                <a href="booking.html?id=${doc.id}" class="flex-1 bg-primary-600 hover:bg-primary-700 text-white font-bold py-2.5 rounded-xl text-center shadow-md shadow-primary-500/30 transition-colors border-2 border-primary-600">Book Now</a>
              </div>
            </div>
          </div>
        `).join('');
        
        container.innerHTML = html;
      }

      function applyFilters() {
        const keyword = document.getElementById('f-keyword').value.toLowerCase();
        const location = document.getElementById('f-location').value.toLowerCase();
        
        const filtered = allDoctors.filter(doc => {
          const mKeyword = keyword === '' || 
                           doc.name.toLowerCase().includes(keyword) || 
                           doc.specialization.toLowerCase().includes(keyword);
          const mLocation = location === '' || 
                            doc.city.toLowerCase().includes(location) || 
                            (doc.location && doc.location.toLowerCase().includes(location)) ||
                            (doc.pin && doc.pin.toLowerCase().includes(location)) ||
                            (doc.doctor_venues && doc.doctor_venues.some(v => 
                              (v.clinic && v.clinic.pin && v.clinic.pin.toLowerCase().includes(location)) || 
                              (v.clinic && v.clinic.name && v.clinic.name.toLowerCase().includes(location))
                            ));
          return mKeyword && mLocation;
        });
        
        renderDoctors(filtered);
      }

      /* Autocomplete Logic Engine */
      const searchInput = document.getElementById('f-keyword');
      const dropdown = document.getElementById('autocomplete-dropdown');
      
      function renderDropdown(val) {
        const matched = [];
        const uniqueSpecialties = new Set();
        const uniqueDoctors = new Set();
        
        if (!val) {
          allDoctors.forEach(doc => {
            if (doc.specialization && !uniqueSpecialties.has(doc.specialization)) {
              uniqueSpecialties.add(doc.specialization);
              matched.push({ type: 'specialty', text: doc.specialization, icon: '⚕️' });
            }
          });
          const topDocs = allDoctors.slice(0, 5);
          topDocs.forEach(doc => {
            matched.push({ type: 'featured doctor', text: doc.name, icon: '👨‍⚕️' });
          });
        } else {
          allDoctors.forEach(doc => {
            if (doc.specialization.toLowerCase().includes(val) && !uniqueSpecialties.has(doc.specialization)) {
              uniqueSpecialties.add(doc.specialization);
              matched.push({ type: 'specialty', text: doc.specialization, icon: '⚕️' });
            }
            if (doc.name.toLowerCase().includes(val) && !uniqueDoctors.has(doc.name)) {
              uniqueDoctors.add(doc.name);
              matched.push({ type: 'doctor', text: doc.name, icon: '👨‍⚕️' });
            }
          });
        }

        if (matched.length === 0) {
          dropdown.innerHTML = '<div class="p-4 text-slate-500 text-xs italic">No suggestions found...</div>';
        } else {
          if (val) matched.sort((a,b) => a.type === 'specialty' ? -1 : 1);
          
          let html = !val ? '<div class="px-3 py-1.5 text-[10px] font-bold text-slate-400 bg-slate-50 border-b border-slate-100 uppercase tracking-wider">Top Suggestions</div>' : '';
          
          html += matched.map(m => `
            <div class="px-3 py-2.5 hover:bg-slate-50 cursor-pointer flex justify-between items-center transition-colors autocomplete-item border-b border-slate-50" data-val="${m.text}">
              <div class="flex items-center gap-2">
                <span class="text-sm opacity-60">${m.icon}</span>
                <span class="font-semibold text-dark text-sm">${m.text}</span>
              </div>
              <span class="text-[10px] text-primary-600 font-bold px-1.5 py-0.5 bg-primary-50 rounded border border-primary-100 capitalize">${m.type}</span>
            </div>
          `).join('');
          
          dropdown.innerHTML = html;

          dropdown.querySelectorAll('.autocomplete-item').forEach(item => {
            item.addEventListener('click', () => {
              searchInput.value = item.getAttribute('data-val');
              dropdown.classList.add('hidden');
              applyFilters(); // Trigger filter on selection
            });
          });
        }
        
        dropdown.classList.remove('hidden');
        if (val) applyFilters(); // Re-filter live on type ONLY if typing
      }

      ['focus', 'click', 'input'].forEach(evt => {
        searchInput.addEventListener(evt, (e) => {
          renderDropdown(e.target.value.toLowerCase().trim());
          if (!e.target.value.trim() && evt === 'input') applyFilters(); // Run empty filter
        });
      });

      // Hide dropdown on off-click
      document.addEventListener('click', (e) => {
        if(searchInput && !searchInput.contains(e.target) && !dropdown.contains(e.target)) {
          dropdown.classList.add('hidden');
        }
      });

      document.getElementById('filter-form').addEventListener('submit', (e) => {
        e.preventDefault();
        applyFilters();
      });

      applyFilters();
    });
  </script>
</body>
</html>
