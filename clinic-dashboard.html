<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clinic Dashboard - QwikDoc</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { primary: { 50: '#f0f9ff', 100: '#e0f2fe', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1' }, secondary: '#22c55e', accent: '#f8fafc', dark: '#0f172a' }, fontFamily: { sans: ['Inter', 'sans-serif'] } } } }
  </script>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/png" href="logo/icon.png">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 text-dark flex flex-col min-h-screen">

  <header id="main-header" class="fixed w-full top-0 z-50 bg-white border-b border-slate-100">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-20">
        <div class="flex-shrink-0 flex items-center">
          <a href="index.html" class="flex items-center group">
            <img src="logo/primary.png" alt="QwikDoc Logo" class="h-14 w-auto object-contain">
            <span class="ml-4 px-2 py-0.5 bg-green-100 text-green-700 text-xs font-bold rounded">Clinic</span>
          </a>
        </div>
      </div>
    </div>
  </header>

  <main class="flex-grow pt-28 pb-16">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      
      <div class="flex flex-col lg:flex-row gap-8">
        <!-- Sidebar -->
        <div class="w-full lg:w-1/4 mb-8 lg:mb-0">
          <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 lg:sticky lg:top-28 fade-in">
            <div class="flex items-center gap-4 mb-6">
              <div class="w-16 h-16 shrink-0 rounded-full bg-green-100 text-green-600 flex items-center justify-center text-3xl font-bold">🏥</div>
              <div class="min-w-0">
                <h2 class="font-bold text-dark text-lg truncate" id="clinic-name">Loading...</h2>
                <p class="text-xs text-slate-500 truncate" id="clinic-address">...</p>
              </div>
            </div>
            
            <nav class="grid grid-cols-1 sm:grid-cols-3 lg:grid-cols-1 gap-2 mb-8">
              <button onclick="switchTab('overview')" id="tab-overview" class="w-full flex items-center gap-3 px-4 py-3 bg-primary-50 text-primary-700 rounded-xl font-medium transition text-left text-sm sm:text-base">
                <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                Overview
              </button>
              <button onclick="switchTab('appointments')" id="tab-appointments" class="w-full flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-50 rounded-xl font-medium transition text-left text-sm sm:text-base">
                <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                Bookings
              </button>
              <button onclick="switchTab('doctors')" id="tab-doctors" class="w-full flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-50 rounded-xl font-medium transition text-left text-sm sm:text-base">
                <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                Doctors
              </button>
            </nav>

            <button onclick="logoutClinic()" class="w-full flex items-center gap-3 px-4 py-3 text-red-600 hover:bg-red-50 rounded-xl font-medium transition text-left text-sm sm:text-base">
              <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
              Logout
            </button>
          </div>
        </div>
v>

        <!-- Main Content Area -->
        <div class="w-full lg:w-3/4 fade-in" style="animation-delay: 0.1s;">
          
          <!-- Analytics Overview Tab -->
          <div id="view-overview" class="block space-y-8">
            <h2 class="text-2xl font-bold text-dark">Business Analytics</h2>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
              <!-- Stat Cards -->
              <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 flex flex-col justify-between hover-float">
                <div class="w-12 h-12 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center mb-4"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg></div>
                <h3 class="text-slate-500 text-sm font-medium">Total Appointments</h3>
                <p class="text-3xl font-bold text-dark mt-1" id="stat-total-appts">0</p>
              </div>

              <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 flex flex-col justify-between hover-float">
                <div class="w-12 h-12 rounded-full bg-green-100 text-green-600 flex items-center justify-center mb-4"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg></div>
                <h3 class="text-slate-500 text-sm font-medium">Total Estimated Revenue</h3>
                <p class="text-3xl font-bold text-dark mt-1" id="stat-revenue">₹0</p>
              </div>

              <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 flex flex-col justify-between hover-float">
                <div class="w-12 h-12 rounded-full bg-purple-100 text-purple-600 flex items-center justify-center mb-4"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg></div>
                <h3 class="text-slate-500 text-sm font-medium">Completion Rate</h3>
                <p class="text-3xl font-bold text-dark mt-1" id="stat-completion">0%</p>
              </div>
            </div>

            <!-- Top Doctors Revenue Split -->
            <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 sm:p-8">
              <h3 class="text-xl font-bold text-dark mb-6">Top Performing Doctors (Revenue)</h3>
              <div id="analytics-doctors-list" class="space-y-4">
                <p class="text-slate-500 text-center py-4">Generating data...</p>
              </div>
            </div>
          </div>

          <!-- Appointments Tab -->
          <div id="view-appointments" class="hidden bg-white rounded-2xl shadow-sm border border-slate-100 p-6 sm:p-8 min-h-[500px]">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
              <h2 class="text-2xl font-bold text-dark">Appointment Management</h2>
              
              <!-- Filter Dropdown -->
              <div class="flex items-center gap-2 w-full sm:w-auto">
                <span class="text-sm font-medium text-slate-500">Filter:</span>
                <select id="appt-doctor-filter" class="flex-grow px-3 py-2 border border-slate-200 rounded-xl focus:ring-2 focus:ring-primary-500 outline-none transition bg-slate-50 text-sm">
                  <option value="ALL">All Doctors</option>
                </select>
              </div>
            </div>
            
            <div id="appointments-list-container" class="space-y-4">
              <div class="spinner mx-auto my-10"></div>
            </div>
          </div>

          <!-- Linked Doctors Tab -->
          <div id="view-doctors" class="hidden bg-white rounded-2xl shadow-sm border border-slate-100 p-6 sm:p-8 min-h-[500px]">
            <h2 class="text-2xl font-bold text-dark mb-6">Our Associated Doctors</h2>
            <div id="clinic-doctors-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-2 xl:grid-cols-3 gap-6">
              <div class="col-span-1 md:col-span-2 lg:col-span-3 text-center py-10"><div class="spinner mx-auto"></div></div>
            </div>
          </div>

        </div>
      </div>
    </div>
  </main>

  <script src="js/supabase.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    let globalAppointments = [];
    let globalDoctorsLinked = [];

    document.addEventListener('DOMContentLoaded', async () => {
      const clinicId = localStorage.getItem('clinicId');
      if (!clinicId) {
        window.location.href = 'clinic-login.html';
        return;
      }

      await loadClinicData(clinicId);
      
      // Parallel fetch to speed up initial load
      const [appts, docs] = await Promise.all([
        DataService.getClinicAppointments(clinicId),
        DataService.getClinicLinkedDoctors(clinicId)
      ]);
      
      globalAppointments = appts;
      globalDoctorsLinked = docs;

      populateDoctorFilter();
      updateAnalytics();
      renderAppointments(globalAppointments);
      renderLinkedDoctors();
    });

    // Custom Switch Tab Implementation
    window.switchTab = function(tab) {
      document.getElementById('view-overview').classList.add('hidden');
      document.getElementById('view-appointments').classList.add('hidden');
      document.getElementById('view-doctors').classList.add('hidden');
      
      document.getElementById('tab-overview').className = 'w-full flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-50 rounded-xl font-medium transition text-left';
      document.getElementById('tab-appointments').className = 'w-full flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-50 rounded-xl font-medium transition text-left';
      document.getElementById('tab-doctors').className = 'w-full flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-50 rounded-xl font-medium transition text-left';
      
      document.getElementById('view-' + tab).classList.remove('hidden');
      document.getElementById('tab-' + tab).className = 'w-full flex items-center gap-3 px-4 py-3 bg-primary-50 text-primary-700 rounded-xl font-medium transition text-left';
    };

    async function loadClinicData(id) {
      try {
        const clinic = await DataService.getClinicById(id);
        if (clinic) {
          document.getElementById('clinic-name').textContent = clinic.name;
          document.getElementById('clinic-address').textContent = `${clinic.address}, PIN: ${clinic.pin}`;
        }
      } catch (e) {
        console.error("Failed to load clinic data", e);
      }
    }

    /* ---- ANALYTICS LOGIC ---- */
    function updateAnalytics() {
      const totalAppts = globalAppointments.length;
      let completedCount = 0;
      let totalRevenue = 0;
      const revenueByDoctor = {};

      globalAppointments.forEach(appt => {
        if (appt.status === 'completed') {
          completedCount++;
          // Fallback fee to 0 if doctor somehow doesn't have one
          const fee = appt.doctor?.consultation_fee || 0;
          totalRevenue += fee;

          // Bucket revenue by doctor
          if (!revenueByDoctor[appt.doctor_id]) {
            revenueByDoctor[appt.doctor_id] = { name: appt.doctorName, revenue: 0, appointments: 0 };
          }
          revenueByDoctor[appt.doctor_id].revenue += fee;
          revenueByDoctor[appt.doctor_id].appointments += 1;
        }
      });

      const completionRate = totalAppts > 0 ? Math.round((completedCount / totalAppts) * 100) : 0;

      // Update UI Stats
      document.getElementById('stat-total-appts').textContent = totalAppts;
      document.getElementById('stat-revenue').textContent = `₹${totalRevenue.toLocaleString()}`;
      document.getElementById('stat-completion').textContent = `${completionRate}%`;

      // Render Top Doctors Table
      const sortedDoctors = Object.values(revenueByDoctor).sort((a,b) => b.revenue - a.revenue);
      const topDocsContainer = document.getElementById('analytics-doctors-list');
      
      if (sortedDoctors.length === 0) {
        topDocsContainer.innerHTML = '<p class="text-slate-400 text-sm">No completed consultation revenue generated yet.</p>';
      } else {
        topDocsContainer.innerHTML = sortedDoctors.map(d => `
          <div class="flex items-center justify-between p-4 bg-slate-50 rounded-xl border border-slate-100">
            <div class="flex items-center gap-3">
              <div class="w-10 h-10 rounded-full bg-primary-100 text-primary-600 flex items-center justify-center font-bold text-sm select-none">${d.name.charAt(4) || 'D'}</div>
              <div>
                <h4 class="font-bold text-dark text-sm">${d.name}</h4>
                <p class="text-xs text-slate-500">${d.appointments} Completed Sessions</p>
              </div>
            </div>
            <div class="text-right">
              <span class="block font-bold text-green-600 block">₹${d.revenue.toLocaleString()}</span>
            </div>
          </div>
        `).join('');
      }
    }

    /* ---- APPOINTMENTS LOGIC ---- */
    function populateDoctorFilter() {
      const select = document.getElementById('appt-doctor-filter');
      globalDoctorsLinked.forEach(d => {
        const option = document.createElement('option');
        option.value = d.doctor_id;
        option.textContent = d.doctorName;
        select.appendChild(option);
      });

      select.addEventListener('change', (e) => {
        const drId = e.target.value;
        if (drId === 'ALL') {
          renderAppointments(globalAppointments);
        } else {
          const filtered = globalAppointments.filter(a => a.doctor_id === drId);
          renderAppointments(filtered);
        }
      });
    }

    function renderAppointments(appointments) {
      const listContainer = document.getElementById('appointments-list-container');
      
      // Sort upcoming first, then recent
      const sorted = [...appointments].sort((a,b) => {
        if (a.status === 'upcoming' && b.status !== 'upcoming') return -1;
        if (a.status !== 'upcoming' && b.status === 'upcoming') return 1;
        return new Date(b.date) - new Date(a.date);
      });

      if (sorted.length === 0) {
        listContainer.innerHTML = `<p class="text-center text-slate-500 bg-slate-50 py-10 rounded-xl border border-dashed border-slate-200">No appointments found.</p>`;
        return;
      }

      let html = '';
      sorted.forEach(b => {
        let statusBadge = '';
        let actions = '';

        if (b.status === 'upcoming') {
          statusBadge = '<span class="bg-blue-100 text-blue-700 text-[10px] px-2 py-0.5 rounded-full font-bold uppercase tracking-wider">Upcoming</span>';
          actions = `
            <button onclick="updateAppt('${b.id}', 'completed')" class="flex-1 bg-green-100 hover:bg-green-200 text-green-700 text-xs font-bold py-2 rounded-xl transition border border-green-200">Complete</button>
            <button onclick="updateAppt('${b.id}', 'cancelled')" class="flex-1 bg-red-100 hover:bg-red-200 text-red-700 text-xs font-bold py-2 rounded-xl transition border border-red-200">Cancel</button>
          `;
        } else if (b.status === 'completed') {
          statusBadge = '<span class="bg-green-100 text-green-700 text-[10px] px-2 py-0.5 rounded-full font-bold uppercase tracking-wider">Completed</span>';
        } else {
          statusBadge = '<span class="bg-red-100 text-red-700 text-[10px] px-2 py-0.5 rounded-full font-bold uppercase tracking-wider">Cancelled</span>';
        }

        html += `
          <div class="bg-white border border-slate-100 rounded-2xl p-5 sm:p-6 flex flex-col gap-4 hover:shadow-md transition">
            <div class="flex justify-between items-start">
              <div class="min-w-0">
                <h3 class="font-bold text-dark text-lg truncate">${b.patientName}</h3>
                <div class="flex items-center gap-2 mt-1">
                  ${statusBadge}
                  <span class="text-xs font-bold text-slate-400">#${b.appointment_number || 'N/A'}</span>
                </div>
              </div>
              <div class="text-right shrink-0">
                <div class="font-bold text-primary-600 text-sm">Dr. ${b.doctorName.split(' ').pop()}</div>
                <div class="text-xs font-medium text-slate-400">${b.date} · ${b.time}</div>
              </div>
            </div>
            
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 text-xs font-medium text-slate-600 bg-slate-50 p-4 rounded-xl">
              <div class="flex items-center gap-2">✉ <span class="truncate">${b.patientEmail}</span></div>
              <div class="flex items-center gap-2">📞 ${b.patientPhone}</div>
              ${b.patient_address ? `<div class="sm:col-span-2 flex items-start gap-2">📍 <span class="line-clamp-2">${b.patient_address}</span></div>` : ''}
            </div>

            <div class="text-xs">
              <span class="text-slate-400 font-bold uppercase text-[9px] tracking-widest block mb-1">Reason for Visit</span>
              <p class="text-slate-700 font-bold">${b.reason || 'Not specified'}</p>
            </div>
            
            <div class="flex gap-2 pt-2 border-t border-slate-50">
              ${actions}
            </div>
          </div>
        `;
      });
      
      listContainer.innerHTML = html;
    }

    async function updateAppt(id, status) {
      if(confirm(`Are you sure you want to mark this appointment as ${status}?`)) {
        try {
          await DataService.updateAppointmentStatus(id, status);
          showToast(`Appointment mapped to ${status}`);
          
          // Refresh global state so analytics stay accurate
          const clinicId = localStorage.getItem('clinicId');
          globalAppointments = await DataService.getClinicAppointments(clinicId);
          
          // Re-render
          updateAnalytics();
          const filterVal = document.getElementById('appt-doctor-filter').value;
          if (filterVal === 'ALL') {
            renderAppointments(globalAppointments);
          } else {
            const filtered = globalAppointments.filter(a => a.doctor_id === filterVal);
            renderAppointments(filtered);
          }
        } catch(e) {
          showToast(`Failed to update status`, 'error');
        }
      }
    };

    /* ---- DOCTORS LOGIC ---- */
    function renderLinkedDoctors() {
      const container = document.getElementById('clinic-doctors-list');
      
      if (globalDoctorsLinked.length === 0) {
        container.innerHTML = `<div class="col-span-full text-center py-10 text-slate-500 bg-slate-50 rounded-2xl border border-dashed border-slate-300">No doctors have selected this clinic as a venue yet.</div>`;
        return;
      }

      container.innerHTML = globalDoctorsLinked.map(doc => `
        <div class="bg-slate-50 border border-slate-100 rounded-2xl p-6 hover-float transition-all">
          <div class="flex items-center gap-4 mb-4">
            <img src="${doc.doctorImage}" alt="${doc.doctorName}" class="w-14 h-14 rounded-full object-cover shadow-sm bg-white" onerror="this.src='https://via.placeholder.com/80'">
            <div>
              <h4 class="font-bold text-dark text-base">${doc.doctorName}</h4>
              <p class="text-xs text-primary-600 font-bold">${doc.doctorSpecialization}</p>
            </div>
          </div>
          <div class="bg-white p-3 rounded-xl border border-slate-100 mb-4 flex justify-between text-xs text-slate-600 font-medium">
            <span>Consultation Fee:</span>
            <span class="text-dark font-bold text-sm">₹${doc.doctorConsultationFee}</span>
          </div>
          <div class="bg-primary-50 px-4 py-3 rounded-xl text-xs font-semibold text-primary-700 w-full text-center">
            ${doc.schedule}
          </div>
        </div>
      `).join('');
    }

    function logoutClinic() {
      localStorage.removeItem('clinicId');
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
