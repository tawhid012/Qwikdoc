<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - QuickDoc</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { primary: { 50: '#f0f9ff', 100: '#e0f2fe', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1' }, dark: '#0f172a' }, fontFamily: { sans: ['Inter', 'sans-serif'] } } } }
  </script>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/png" href="logo/icon.png">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="auth-page-premium text-dark min-h-screen flex flex-col justify-center py-10 sm:px-6 lg:px-8">
  
  <div class="auth-shell sm:mx-auto sm:w-full sm:max-w-md fade-in">
    <a href="index.html" class="auth-logo-chip block w-fit mx-auto mb-7 rounded-2xl px-4 py-3">
      <img src="logo/primary.png" alt="QwikDoc Logo" class="h-14 w-auto object-contain">
    </a>
    
    <div class="auth-card-premium py-8 px-4 sm:rounded-3xl sm:px-10 relative overflow-hidden">
      
      <div class="mb-8 text-center">
        <h2 class="text-2xl font-bold text-dark mb-2">Create an Account</h2>
        <p class="text-sm text-slate-500">Join QuickDoc and manage your healthcare easily.</p>
      </div>

      <div id="error-msg" class="hidden mb-6 bg-red-50 text-red-600 border border-red-200 rounded-lg p-3 text-sm flex items-center gap-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        <span id="error-text">An error occurred</span>
      </div>

      <form class="space-y-5" id="signup-form">
        <!-- Immutable Role -->
        <input type="hidden" id="role" value="patient">

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Full Name</label>
          <input id="name" type="text" required class="auth-input appearance-none block w-full px-4 py-3 rounded-xl" placeholder="John Doe">
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Phone Number</label>
          <input id="phone" type="tel" required class="auth-input appearance-none block w-full px-4 py-3 rounded-xl" placeholder="+91 98765 43210">
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Email address</label>
          <input id="email" type="email" required class="auth-input appearance-none block w-full px-4 py-3 rounded-xl" placeholder="you@example.com">
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
          <input id="password" type="password" required class="auth-input appearance-none block w-full px-4 py-3 rounded-xl" placeholder="Create a strong password">
        </div>

        <!-- Doctor specific fields removed -->

        <div class="mt-2">
          <button type="submit" id="submit-btn" class="auth-btn-primary w-full flex justify-center py-3 px-4 border border-transparent rounded-xl text-sm font-medium text-white focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500 transition-all">
            Create Account
          </button>
        </div>
      </form>

      <div class="mt-6 text-center">
        <p class="text-sm text-slate-600">
          Already have an account? <a href="login.html" class="font-medium text-primary-600 hover:text-primary-500">Log in</a>
        </p>
      </div>
    </div>
  </div>

  <script src="js/supabase.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {

      document.getElementById('signup-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const role = 'patient';
        const name = document.getElementById('name').value;
        const phone = document.getElementById('phone').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        
        const btn = document.getElementById('submit-btn');
        const errBox = document.getElementById('error-msg');
        const errTxt = document.getElementById('error-text');
        
        btn.innerHTML = '<div class="spinner border-t-white w-5 h-5"></div>';
        errBox.classList.add('hidden');

        const userData = {
          role: role,
          name: name,
          phone: phone,
        };
        
        const result = await AuthService.signup(email, password, userData);
        
        if (result.success) {
          window.location.href = 'user-dashboard.html';
        } else {
          errTxt.textContent = result.message || 'Error creating account';
          errBox.classList.remove('hidden');
          btn.textContent = 'Create Account';
        }
      });
    });
  </script>
</body>
</html>
