<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Provider Login - QuickDoc</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { primary: { 50: '#f0f9ff', 100: '#e0f2fe', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1' }, dark: '#0f172a' }, fontFamily: { sans: ['Inter', 'sans-serif'] } } } }
  </script>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/png" href="logo/icon.png">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="auth-page-premium text-dark min-h-screen flex flex-col justify-center py-10 sm:px-6 lg:px-8">
  
  <div class="auth-shell sm:mx-auto sm:w-full sm:max-w-md fade-in">
    <a href="index.html" class="auth-logo-chip block w-fit mx-auto mb-7 rounded-2xl px-4 py-3">
      <img src="logo/primary.png" alt="QwikDoc Logo" class="h-14 w-auto object-contain">
    </a>
    
    <div class="auth-card-premium py-8 px-4 sm:rounded-3xl sm:px-10 relative overflow-hidden">
      
      <div class="mb-8 text-center flex flex-col items-center">
        <span class="bg-primary-50 text-primary-700 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-widest mb-3 border border-primary-100 shadow-sm inline-block">Provider Portal</span>
        <h2 class="text-2xl font-bold text-dark mb-2">Welcome Back, Doctor</h2>
        <p class="text-sm text-slate-500">Please enter your details to sign in.</p>
      </div>

      <div id="error-msg" class="hidden mb-6 bg-red-50 text-red-600 border border-red-200 rounded-lg p-3 text-sm flex items-center gap-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        <span id="error-text">Invalid email or password</span>
      </div>

      <form class="space-y-6" id="login-form">
        <div>
          <label for="email" class="block text-sm font-medium text-slate-700 mb-1">Email address</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <svg class="h-5 w-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
            </div>
            <input id="email" name="email" type="email" autocomplete="email" required class="auth-input appearance-none block w-full pl-10 pr-3 py-3 rounded-xl placeholder-slate-400" placeholder="dr@example.com">
          </div>
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-slate-700 mb-1">Password</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <svg class="h-5 w-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            </div>
            <input id="password" name="password" type="password" autocomplete="current-password" required class="auth-input appearance-none block w-full pl-10 pr-3 py-3 rounded-xl placeholder-slate-400" placeholder="••••••••">
          </div>
        </div>

        <div class="flex items-center justify-between">
          <div class="flex items-center">
            <input id="remember-me" name="remember-me" type="checkbox" class="h-4 w-4 text-primary-600 focus:ring-primary-500 border-slate-300 rounded">
            <label for="remember-me" class="ml-2 block text-sm text-slate-700">Remember me</label>
          </div>
          <div class="text-sm border-b border-transparent">
            <a href="#" class="font-medium text-primary-600 hover:text-primary-500">Forgot password?</a>
          </div>
        </div>

        <div>
          <button type="submit" id="submit-btn" class="auth-btn-primary w-full flex justify-center py-3 px-4 border border-transparent rounded-xl text-sm font-medium text-white focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500 transition-all">
            Sign In to Provider Portal
          </button>
        </div>
      </form>

      <div class="mt-8 pt-6 border-t border-slate-100 flex flex-col items-center">
        <p class="text-sm text-slate-600 text-center">
          Not registered as a provider? <a href="doctor-signup.html" class="font-medium text-primary-600 hover:text-primary-500">Sign up</a>
        </p>
      </div>
    </div>
  </div>

  <script src="js/supabase.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      // Small delay to ensure auth states load
      setTimeout(() => {
        if (AuthService.isAuthenticated()) {
          const user = AuthService.getCurrentUser();
          if (user.role === 'doctor') window.location.href = 'doctor-dashboard.html';
          else {
            AuthService.logout(); // patient trying to hit provider login page
          }
        }
      }, 500);

      document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        const btn = document.getElementById('submit-btn');
        const errBox = document.getElementById('error-msg');
        const errTxt = document.getElementById('error-text');
        
        btn.innerHTML = '<div class="spinner border-t-white w-5 h-5"></div>';
        errBox.classList.add('hidden');
        
        const result = await AuthService.login(email, pass);
        
        if (result.success) {
          if (result.user.role === 'patient') {
            await AuthService.logout();
            errTxt.textContent = "This portal is for Providers only. Please use Patient Login.";
            errBox.classList.remove('hidden');
            btn.textContent = 'Sign In to Provider Portal';
            return;
          }
          window.location.href = 'doctor-dashboard.html';
        } else {
          errTxt.textContent = result.message || 'Error occurred';
          errBox.classList.remove('hidden');
          btn.textContent = 'Sign In to Provider Portal';
        }
      });
    });
  </script>
</body>
</html>
